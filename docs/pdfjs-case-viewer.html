<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CaseTools PDF.js Viewer</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #2a2a2e;
            color: #f9f9fb;
        }

        .loading {
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="loading">Loading PDF.js viewer...</div>
    <script type="module">
        const PDFJS_ROOT = 'https://mozilla.github.io/pdf.js/';
        const PDFJS_WEB = `${PDFJS_ROOT}web/`;
        const PDFJS_BUILD = `${PDFJS_ROOT}build/`;
        const BRIDGE_URL = new URL('./utils/pdf/pdfjsCaseViewerBridge.js', window.location.href).href;

        try {
            const [viewerHtml, viewerScript] = await Promise.all([
                fetch(`${PDFJS_WEB}viewer.html`).then(response => {
                    if (!response.ok) throw new Error(`Failed to load PDF.js viewer HTML: ${response.status}`);
                    return response.text();
                }),
                fetch(`${PDFJS_WEB}viewer.mjs`).then(response => {
                    if (!response.ok) throw new Error(`Failed to load PDF.js viewer script: ${response.status}`);
                    return response.text();
                }),
            ]);

            const patchedViewerScript = viewerScript
                .replace('value: "../web/cmaps/"', `value: "${PDFJS_WEB}cmaps/"`)
                .replace('value: "../web/iccs/"', `value: "${PDFJS_WEB}iccs/"`)
                .replace('value: "../web/standard_fonts/"', `value: "${PDFJS_WEB}standard_fonts/"`)
                .replace('value: "../web/wasm/"', `value: "${PDFJS_WEB}wasm/"`)
                .replace('value: "../build/pdf.worker.mjs"', `value: "${PDFJS_BUILD}pdf.worker.mjs"`)
                .replace('value: "../build/pdf.sandbox.mjs"', `value: "${PDFJS_BUILD}pdf.sandbox.mjs"`)
                .replace('value: "./debugger.mjs"', `value: "${PDFJS_WEB}debugger.mjs"`)
                .replace('value: "compressed.tracemonkey-pldi-09.pdf"', 'value: ""');

            const viewerScriptUrl = URL.createObjectURL(new Blob([patchedViewerScript], { type: 'text/javascript' }));
            const rewrittenHtml = viewerHtml
                .replace('href="locale/locale.json"', `href="${PDFJS_WEB}locale/locale.json"`)
                .replace('src="../build/pdf.mjs"', `src="${PDFJS_BUILD}pdf.mjs"`)
                .replace('href="viewer.css"', `href="${PDFJS_WEB}viewer.css"`)
                .replace('src="viewer.mjs"', `src="${viewerScriptUrl}"`)
                .replace('</body>', `<script src="${BRIDGE_URL}"><\/script></body>`);

            document.open();
            document.write(rewrittenHtml);
            document.close();
        } catch (error) {
            console.error(error);
            document.body.innerHTML = `<div class="loading">Could not load PDF.js viewer: ${error.message}</div>`;
            window.parent.postMessage({
                type: 'case-tools-pdfjs-error',
                message: 'Could not load PDF.js viewer.',
                detail: error.message,
            }, window.location.origin);
        }
    </script>
</body>
</html>
